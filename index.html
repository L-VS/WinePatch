<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinePatch</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 2.5em;
            color: #9b59b6; /* Purple */
        }
        .logo {
            margin: 20px auto;
            width: 100px;
        }
        .features {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }
        .feature {
            background-color: #e74c3c; /* Wine-red */
            border-radius: 10px;
            padding: 20px;
            width: 30%;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 30px;
        }
        .cta {
            margin: 50px;
            padding: 15px;
            background-color: #9b59b6; /* Purple */
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to WinePatch</h1>
        <img src="logo.png" alt="WinePatch Logo" class="logo">
    </header>
    <section class="features">
        <div class="feature">
            <h2>Feature 1</h2>
            <p>Description of feature 1.</p>
        </div>
        <div class="feature">
            <h2>Feature 2</h2>
            <p>Description of feature 2.</p>
        </div>
        <div class="feature">
            <h2>Feature 3</h2>
            <p>Description of feature 3.</p>
        </div>
    </section>
    <footer>
        <button class="cta">Get Started with WinePatch</button>
        <p>&copy; 2026 WinePatch. All Rights Reserved.</p>
    </footer>
</body>
</html>
